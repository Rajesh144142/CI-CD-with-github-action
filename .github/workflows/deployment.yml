name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run security
      - run: npm test

  staging:
    if: github.ref == 'develop'
    needs: test
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: echo "Staging CI gate passed"

  production:
    if: github.ref == 'main'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Production CI gate passed"
